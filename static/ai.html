<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小鹏同学 · AI 助手</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #232340;
  --primary: #6c63ff;
  --primary-light: #8b83ff;
  --accent: #00d4aa;
  --text: #e8e8f0;
  --text-muted: #8888aa;
  --border: #2a2a45;
  --user-bubble: #6c63ff;
  --ai-bubble: #232340;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --warn: #ff6b6b;
}

/* 亮色主题 */
body.light {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --surface2: #f0f1f5;
  --primary: #5b52e6;
  --primary-light: #7c74f0;
  --accent: #00b894;
  --text: #2d3436;
  --text-muted: #636e72;
  --border: #dfe6e9;
  --user-bubble: #5b52e6;
  --ai-bubble: #f0f1f5;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --warn: #e74c3c;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 顶部导航 */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.topbar .back { color: var(--text-muted); text-decoration: none; font-size: 18px; transition: color 0.2s; }
.topbar .back:hover { color: var(--primary-light); }
.topbar .info { flex: 1; }
.topbar .info h1 { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar .info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.topbar .badge { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }

/* 消息区域 */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* 欢迎消息 */
.welcome { text-align: center; padding: 40px 20px; animation: fadeIn 0.6s ease; }
.welcome .icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px; font-size: 36px;
}
.welcome h2 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.welcome p { color: var(--text-muted); font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

.feature-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
.feature-chips .chip {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 20px; font-size: 13px; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}
.feature-chips .chip:hover { border-color: var(--primary); color: var(--primary-light); background: rgba(108, 99, 255, 0.1); }
.feature-chips .chip i { margin-right: 6px; }

/* 头像 */
.msg .avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
}

/* 消息气泡 */
.msg { display: flex; gap: 10px; max-width: 85%; animation: slideUp 0.3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.msg .avatar {
  width: 36px; height: 36px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px;
}
.msg.user .avatar { background: var(--user-bubble); }
.msg.ai .avatar { background: linear-gradient(135deg, var(--primary), var(--accent)); }
.msg .bubble { padding: 12px 16px; border-radius: var(--radius); line-height: 1.7; font-size: 14px; word-break: break-word; }
.msg.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.ai .bubble p { margin-bottom: 8px; }
.msg.ai .bubble p:last-child { margin-bottom: 0; }
.msg .bubble img { max-width: 100%; border-radius: 12px; margin: 8px 0; cursor: pointer; transition: transform 0.2s; }
.msg .bubble img:hover { transform: scale(1.02); }

/* 加载动画 */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

/* 输入区域 */
.input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  flex-shrink: 0;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
.input-wrap {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 24px; display: flex; align-items: flex-end;
  padding: 4px 4px 4px 16px; transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: var(--primary); }
.input-wrap textarea {
  flex: 1; background: none; border: none; color: var(--text);
  font-size: 14px; font-family: inherit; resize: none; outline: none;
  padding: 10px 0; max-height: 120px; line-height: 1.5;
}
.input-wrap textarea::placeholder { color: var(--text-muted); }

.input-actions { display: flex; gap: 4px; align-items: center; }
.input-actions .mode-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: none; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s; position: relative;
}
.input-actions .mode-btn:hover { color: var(--primary-light); background: rgba(108,99,255,0.1); }
.input-actions .mode-btn.active { color: var(--primary-light); background: rgba(108,99,255,0.15); }
.input-actions .mode-btn .tooltip {
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: var(--surface); color: var(--text); font-size: 12px;
  padding: 4px 10px; border-radius: 8px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
  margin-bottom: 6px; border: 1px solid var(--border);
}
.input-actions .mode-btn:hover .tooltip { opacity: 1; }

.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(108,99,255,0.4); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* 模式指示器 */
.mode-indicator { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; height: 18px; transition: all 0.2s; }
.mode-indicator span { background: var(--surface2); padding: 3px 12px; border-radius: 10px; border: 1px solid var(--border); }
.mode-indicator i { margin-right: 4px; }

/* 图片预览 */
.image-preview { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
.image-preview.show { display: flex; }
.image-preview img { max-width: 90%; max-height: 90%; border-radius: 12px; box-shadow: var(--shadow); }

/* 上传图片预览条 */
.upload-preview {
  display: none; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 8px 12px; margin-bottom: 8px;
  max-width: 900px; margin-left: auto; margin-right: auto;
}
.upload-preview.show { display: flex; }
.upload-preview img {
  width: 48px; height: 48px; object-fit: cover; border-radius: 8px;
  border: 1px solid var(--border);
}
.upload-preview .info { flex: 1; font-size: 12px; color: var(--text-muted); }
.upload-preview .info .name { color: var(--text); font-size: 13px; }
.upload-preview .remove-btn {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: rgba(255,107,107,0.15); color: var(--warn); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  transition: all 0.2s;
}
.upload-preview .remove-btn:hover { background: rgba(255,107,107,0.3); }


/* 动画 */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

/* 流式光标 */
.stream-cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: var(--accent);
  margin-left: 2px;
  animation: blink 1s infinite;
  vertical-align: middle;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

/* 图片尺寸选择器 */
.size-selector {
  display: none; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 6px 12px; margin-bottom: 8px;
  max-width: 900px; margin-left: auto; margin-right: auto;
  flex-wrap: wrap;
}
.size-selector.show { display: flex; }
.size-selector label { font-size: 12px; color: var(--text-muted); }
.size-selector .size-opt {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  padding: 4px 12px; border-radius: 8px; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.size-selector .size-opt:hover { border-color: var(--primary); color: var(--primary-light); }
.size-selector .size-opt.active { border-color: var(--primary); color: var(--primary-light); background: rgba(108,99,255,0.15); }

/* Markdown 渲染 */
.bubble h1, .bubble h2, .bubble h3 { margin: 12px 0 6px; line-height: 1.4; }
.bubble h1 { font-size: 18px; }
.bubble h2 { font-size: 16px; }
.bubble h3 { font-size: 15px; }
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble ul, .bubble ol { margin: 6px 0; padding-left: 20px; }
.bubble li { margin-bottom: 3px; }
.bubble code {
  background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px;
  font-family: 'Consolas', 'Monaco', monospace; font-size: 13px;
  color: var(--accent);
}
.bubble pre {
  background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px;
  margin: 8px 0; overflow-x: auto;
}
.bubble pre code { background: none; padding: 0; color: var(--text); }
.bubble blockquote {
  border-left: 3px solid var(--primary); padding-left: 12px;
  margin: 8px 0; color: var(--text-muted);
}
.bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; }
.bubble th { background: rgba(0,0,0,0.2); }
.bubble a { color: var(--accent); text-decoration: underline; }
.bubble strong { color: #fff; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

/* 响应式 */
@media (max-width: 768px) {
  .msg { max-width: 92%; }
  .welcome h2 { font-size: 20px; }
  .feature-chips .chip { font-size: 12px; padding: 6px 12px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <a href="/" class="back"><i class="fas fa-arrow-left"></i></a>
  <div class="info">
    <h1>小鹏同学</h1>
    <p>AI 助手 · 对话 / 生成图片 / 生成视频</p>
  </div>
  <span class="badge">Agnes AI</span>
  <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s;" id="themeBtn" title="切换主题">🌙</button>
</div>

<!-- 消息区域 -->
<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="icon">🤖</div>
    <h2>你好，我是小鹏同学</h2>
    <p>我可以和你聊天、帮你生成图片和视频。试试点击下方功能按钮切换模式~</p>
    <div class="feature-chips">
      <div class="chip" onclick="setMode('chat')"><i class="fas fa-comments"></i>智能对话</div>
      <div class="chip" onclick="setMode('image')"><i class="fas fa-image"></i>生成图片</div>
            <div class="chip" onclick="setMode('video')"><i class="fas fa-video"></i>生成视频</div>
    </div>
  </div>
</div>

<!-- 输入区域 -->
<div class="input-area">
  <!-- 上传图片预览 -->
  <div class="upload-preview" id="uploadPreview">
    <img id="uploadThumb" src="" alt="uploaded">
    <div class="info">
      <div class="name" id="uploadName">image.png</div>
      <div id="uploadSize">-</div>
    </div>
    <button class="remove-btn" onclick="removeUpload()"><i class="fas fa-times"></i></button>
  </div>

  <!-- 生图尺寸选择 -->
  <div class="size-selector" id="sizeSelector">
    <label>尺寸：</label>
    <button class="size-opt active" onclick="setSize('1024x1024',this)">1:1</button>
    <button class="size-opt" onclick="setSize('1024x768',this)">4:3</button>
    <button class="size-opt" onclick="setSize('768x1024',this)">3:4</button>
    <button class="size-opt" onclick="setSize('1280x720',this)">16:9</button>
    <button class="size-opt" onclick="setSize('720x1280',this)">9:16</button>
  </div>


  <div class="mode-indicator" id="modeIndicator">
    <span><i class="fas fa-comments"></i> 智能对话模式</span>
  </div>
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <button class="mode-btn" id="btnChat" onclick="setMode('chat')" title="对话">
          <i class="fas fa-comments"></i>
          <span class="tooltip">智能对话</span>
        </button>
        <button class="mode-btn" id="btnImage" onclick="setMode('image')" title="生图">
          <i class="fas fa-image"></i>
          <span class="tooltip">生成图片</span>
        </button>
        <button class="mode-btn" id="btnVideo" onclick="setMode('video')" title="视频">
          <i class="fas fa-video"></i>
          <span class="tooltip">生成视频</span>
        </button>
        <label class="mode-btn" id="btnUpload" title="上传图片" style="cursor:pointer;">
          <i class="fas fa-upload"></i>
          <span class="tooltip">上传图片</span>
          <input type="file" accept="image/*" onchange="handleUpload(this)" style="display:none;">
        </label>
      </div>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>

<!-- 图片预览 -->
<div class="image-preview" id="imgPreview" onclick="this.classList.remove('show')">
  <img id="previewImg" src="" alt="preview">
</div>

<!-- 隐藏的文件上传 -->
<input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleUpload(this)">

<script>
const API_BASE = '/api/ai';
let currentMode = 'chat'; // chat | image | edit | video
let isLoading = false;
let lastSendTime = 0;
const RATE_LIMIT_MS = 3000; // 3秒冷却
let uploadedImageBase64 = null;
let imageSize = '1024x1024'; // 默认图片尺寸

// 对话历史（仅 chat 模式用）
let chatHistory = [
  { role: 'system', content: '你是小鹏同学，一个友好、专业的 AI 助手。用中文回复，简洁有条理。' }
];

const modeConfig = {
  chat:  { icon: 'fa-comments',    label: '智能对话模式', placeholder: '输入消息...' },
  image: { icon: 'fa-image',       label: '图片生成模式', placeholder: '描述你想生成的图片...' },
  video: { icon: 'fa-video',       label: '视频生成模式', placeholder: '描述你想生成的视频...' }
};

function setMode(mode) {
  currentMode = mode;
  const cfg = modeConfig[mode];

  // 更新按钮状态
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const btnId = 'btn' + mode.charAt(0).toUpperCase() + mode.slice(1);
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');

  // 显示/隐藏尺寸选择器（仅生图模式）
  document.getElementById('sizeSelector').classList.toggle('show', mode === 'image');

  // 更新指示器
  document.getElementById('modeIndicator').innerHTML =
    `<span><i class="fas ${cfg.icon}"></i> ${cfg.label}</span>`;

  // 更新 placeholder
  document.getElementById('userInput').placeholder = cfg.placeholder;

  // 聚焦输入框
  document.getElementById('userInput').focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function renderMD(text) {
  try { return marked.parse(text); } catch (e) { return text.replace(/\n/g, '<br>'); }
}

function addMessage(role, content, extra = {}) {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = role === 'user' ? '<img src="/images/touxiang.jpg" alt="user">' : '<img src="/images/jiapengtech.jpg" alt="ai">';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (extra.image) {
    bubble.innerHTML = `<p>${content}</p><img src="${extra.image}" onclick="showPreview(this.src)" loading="lazy">`;
  } else if (extra.video) {
    bubble.innerHTML = `<p>${content}</p><video controls style="max-width:100%;border-radius:12px;margin:8px 0"><source src="${extra.video}" type="video/mp4"></video>`;
  } else {
    bubble.innerHTML = role === 'ai' ? renderMD(content) : content.replace(/\n/g, '<br>');
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  scrollToBottom();
}

// 用户发送带图片的消息
function addUserMessageWithImage(text, imgBase64) {
  const area = document.getElementById('chatArea');
  const welcome = area.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="avatar"><i class="fas fa-user"></i></div>
    <div class="bubble">
      <p>${text}</p>
      <img src="${imgBase64}" onclick="showPreview(this.src)" style="max-width:200px;border-radius:12px;margin-top:8px;cursor:pointer;">
    </div>
  `;
  area.appendChild(div);
  scrollToBottom();
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="avatar"><i class="fas fa-robot"></i></div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  area.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function showPreview(src) {
  document.getElementById('previewImg').src = src;
  document.getElementById('imgPreview').classList.add('show');
}

// ========== 图片上传 ==========
function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;

  // 限制 10MB
  if (file.size > 10 * 1024 * 1024) {
    alert('图片不能超过 10MB');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedImageBase64 = e.target.result; // data:image/xxx;base64,...

    // 显示预览条
    document.getElementById('uploadThumb').src = uploadedImageBase64;
    document.getElementById('uploadName').textContent = file.name;
    document.getElementById('uploadSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('uploadPreview').classList.add('show');

    // 保持当前模式
  };
  reader.readAsDataURL(file);

  // 清空 input 以便重复选择同一文件
  input.value = '';
}

function removeUpload() {
  uploadedImageBase64 = null;
  document.getElementById('uploadPreview').classList.remove('show');
}

function setSize(size, btn) {
  imageSize = size;
  document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}



// ========== 发送消息 ==========
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // 频率限制
  const now = Date.now();
  if (now - lastSendTime < RATE_LIMIT_MS) {
    addMessage('ai', '⏳ 操作太频繁，请 ' + Math.ceil((RATE_LIMIT_MS - (now - lastSendTime)) / 1000) + ' 秒后再试。');
    return;
  }
  lastSendTime = now;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  // 有图片时显示图片消息
  if (uploadedImageBase64) {
    addUserMessageWithImage(text, uploadedImageBase64);
  } else {
    addMessage('user', text);
  }

  input.value = '';
  input.style.height = 'auto';

  addTyping();

  try {
    if (currentMode === 'chat') {
      await doChat(text);
    } else if (currentMode === 'image') {
      await doImage(text);
    } else if (currentMode === 'video') {
      await doVideo(text);
    }
  } catch (err) {
    removeTyping();
    addMessage('ai', `❌ 出错了：${err.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// ========== API 调用 ==========
async function doChat(text) {
  // 有图片时用多模态格式
  if (uploadedImageBase64) {
    chatHistory.push({
      role: 'user',
      content: [
        { type: 'text', text: text },
        { type: 'image_url', image_url: { url: uploadedImageBase64 } }
      ]
    });
  } else {
    chatHistory.push({ role: 'user', content: text });
  }

  // 创建流式消息气泡
  removeTyping();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="avatar"><img src="/images/jiapengtech.jpg" alt="ai"></div><div class="bubble"><span class="stream-cursor"></span></div>';
  area.appendChild(div);
  const bubble = div.querySelector('.bubble');
  scrollToBottom();

  let fullReply = '';

  try {
    const res = await fetch(API_BASE + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory, stream: true })
    });
    if (!res.ok) throw new Error('请求失败 (' + res.status + ')');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') continue;
        try {
          const parsed = JSON.parse(d);
          const delta = parsed.choices?.[0]?.delta?.content;
          if (delta) {
            fullReply += delta;
            bubble.innerHTML = renderMD(fullReply) + '<span class="stream-cursor"></span>';
            scrollToBottom();
          }
        } catch (e) {}
      }
    }

    bubble.innerHTML = renderMD(fullReply) || '抱歉，没有收到回复。';
    chatHistory.push({ role: 'assistant', content: fullReply });
  } catch (err) {
    bubble.innerHTML = '❌ ' + err.message;
  }

  if (uploadedImageBase64) removeUpload();
}

async function doImage(prompt) {
  const body = { prompt, size: imageSize || '1024x1024' };
  if (uploadedImageBase64) body.image = uploadedImageBase64;
  const res = await fetch(API_BASE + '/image', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || `图片生成失败 (${res.status})`); }
  const data = await res.json();
  const url = data.data?.[0]?.url;
  removeTyping();
  if (url) { addMessage('ai', '✨ 图片已生成：', { image: url }); }
  else { addMessage('ai', '⚠️ 图片生成成功，但未返回 URL。'); }
}

async function doVideo(prompt) {
  const body = { prompt };
  if (uploadedImageBase64) body.image_url = uploadedImageBase64;
  const res = await fetch(API_BASE + '/video', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || `视频生成失败 (${res.status})`); }
  const data = await res.json();
  const url = data.data?.[0]?.url || data.video_url;
  removeTyping();
  if (url) { addMessage('ai', '🎬 视频已生成：', { video: url }); }
  else { addMessage('ai', '⚠️ 视频生成成功，但未返回 URL。'); }
}

// ========== 主题切换 ==========
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

// 初始化主题
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

// 初始化
setMode('chat');
</script>
