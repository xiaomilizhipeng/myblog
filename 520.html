<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给特别的十一</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
    overflow: hidden;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    cursor: pointer;
  }
  canvas { position: fixed; top: 0; left: 0; z-index: 1; }
  
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  
  .title {
    color: #e8b4bc;
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 8px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeIn 2s ease forwards 1s;
  }
  
  .message {
    color: #f0e6e8;
    font-size: 24px;
    line-height: 1.8;
    text-align: center;
    max-width: 600px;
    min-height: 80px;
  }
  
  .message span {
    border-right: 2px solid #e8b4bc;
    animation: blink 0.8s infinite;
  }
  
  @keyframes blink {
    0%, 50% { border-color: #e8b4bc; }
    51%, 100% { border-color: transparent; }
  }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  .countdown {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    color: rgba(232, 180, 188, 0.7);
    font-size: 14px;
    letter-spacing: 2px;
  }
  
  .countdown .days {
    font-size: 36px;
    font-weight: 300;
    color: #e8b4bc;
    margin: 10px 0;
  }
  
  .music-hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    color: rgba(232, 180, 188, 0.6);
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 1;
    transition: opacity 1s;
  }
  
  .music-hint.hidden { opacity: 0; pointer-events: none; }
  
  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    animation: floatUp 2s ease-out forwards;
  }
  
  .click-heart .text {
    color: #ff6b8a;
    font-size: 16px;
    white-space: nowrap;
    text-align: center;
    margin-top: 8px;
    animation: fadeScale 0.3s ease forwards;
  }
  
  @keyframes floatUp {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
  }
  
  @keyframes fadeScale {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="music-hint" id="musicHint">♪ 即将播放轻音乐</div>

<div class="content">
  <div class="title">TO 十一</div>
  <div class="message" id="message"></div>
</div>

<div class="countdown">
  <div>我们相识</div>
  <div class="days" id="days">0</div>
  <div>天</div>
</div>

<audio id="bgm" loop preload="auto">
  <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let width, height;

// 设置画布
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 樱花粒子
class Petal {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * -100;
    this.size = Math.random() * 8 + 4;
    this.speedY = Math.random() * 0.5 + 0.3;
    this.speedX = Math.random() * 0.4 - 0.2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotationSpeed = Math.random() * 0.02 - 0.01;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.wobble = Math.random() * Math.PI * 2;
  }
  
  update() {
    this.y += this.speedY;
    this.wobble += 0.02;
    this.x += Math.sin(this.wobble) * 0.3 + this.speedX;
    this.rotation += this.rotationSpeed;
    
    if (this.y > height + 20) this.reset();
  }
  
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = '#ffb7c5';
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// 初始化樱花
for (let i = 0; i < 60; i++) {
  const petal = new Petal();
  petal.y = Math.random() * height;
  particles.push(petal);
}

// 动画循环
function animate() {
  ctx.clearRect(0, 0, width, height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();

// 打字机效果
const text = "从遇见你的那一刻起，我的世界便有了颜色。\n每一天醒来，想到有你在身边，\n就是我最想珍惜的小幸运。";
const messageEl = document.getElementById('message');
let charIndex = 0;
let lineIndex = 0;
const lines = text.split('\n');

function typeWriter() {
  if (lineIndex < lines.length) {
    if (charIndex < lines[lineIndex].length) {
      messageEl.innerHTML = lines.slice(0, lineIndex).join('<br>') + '<br>' + 
        lines[lineIndex].substring(0, charIndex + 1) + '<span></span>';
      charIndex++;
      setTimeout(typeWriter, 60);
    } else {
      lineIndex++;
      charIndex = 0;
      setTimeout(typeWriter, 400);
    }
  } else {
    messageEl.innerHTML = text.replace(/\n/g, '<br>');
  }
}

setTimeout(typeWriter, 2000);

// 尝试自动播放，失败则等用户点击
const bgm = document.getElementById('bgm');
bgm.volume = 0.4;
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  bgm.play().then(() => {
    musicStarted = true;
    document.getElementById('musicHint').classList.add('hidden');
  }).catch(() => {});
}

setTimeout(startMusic, 3000);

// 用户首次点击时也尝试播放
document.addEventListener('click', function handler() {
  startMusic();
  if (musicStarted) document.removeEventListener('click', handler);
});

// 点击爱心效果
document.addEventListener('click', (e) => {
  createHeart(e.clientX, e.clientY);
});

function createHeart(x, y) {
  const heart = document.createElement('div');
  heart.className = 'click-heart';
  heart.style.left = x + 'px';
  heart.style.top = y + 'px';
  heart.innerHTML = `
    <svg width="40" height="40" viewBox="0 0 24 24" fill="#ff6b8a">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
    <div class="text">我喜欢你</div>
  `;
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 2000);
}

// 倒计时（设置你们认识的日期）
const startDate = new Date('2025-08-10'); // 修改为你们认识的日期
function updateCountdown() {
  const now = new Date();
  const diff = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
  document.getElementById('days').textContent = diff;
}
updateCountdown();
setInterval(updateCountdown, 60000);
</script>
</body>
</html>
